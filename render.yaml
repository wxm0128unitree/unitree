# Render 一键部署配置（Blueprint）
# 部署步骤：
#   1. 推送此文件到 GitHub
#   2. Render Dashboard → New + → Blueprint
#   3. 选 unitree 仓库，连进来
#   4. 点 Apply → 等 5-8 分钟
# 注：JWT_SECRET 会被 run_prod.py 自动生成；CORS_ORIGINS 和 VITE_API_BASE 部署后回填。

databases:
  - name: unitree-db
    databaseName: unitree
    user: unitree

services:
  # ─── Backend（FastAPI） ─────────────────────────────────────
  - type: web
    name: unitree-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python run_prod.py"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: unitree-db
          property: connectionString   # Render 自动注入 postgresql://...
      - key: ADMIN_NAME
        value: admin
      - key: ADMIN_PHONE
        value: "13083401281"
      - key: ADMIN_PASSWORD
        value: "111111"
      - key: ALLOW_REGISTER
        value: "1"
      - key: CORS_ORIGINS
        sync: false                   # 部署后填 frontend URL
      - key: PORT
        value: "10000"

  # ─── Frontend（Vite 静态站点） ─────────────────────────────
  # 注意：Blueprint 不支持 type:static，必须用 type:web + runtime:static
  - type: web
    name: unitree-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE
        sync: false                   # 填 backend URL，例如 https://unitree-backend.onrender.com