# ====================================================================
# 宇树机器人出入库管理系统 - 一键部署
# ====================================================================
# 使用：
#   1. 拷贝此目录到服务器
#   2. 修改 BACKEND_DOMAIN（首次必须是 ip），再修改域名解析
#   3. docker compose up -d
#
# 国内部署建议：
#   - 服务器：阿里云 ECS（轻量应用服务器/ECS 都可以，2核 2G 起）
#   - 系统：Ubuntu 22.04 LTS / Debian 12
#   - 域名必须在阿里云备案后才能用 80/443（详见 README.md）
# ====================================================================

services:
  # --------------------------- Nginx 反代 + 自动 HTTPS ---------------------------
  caddy:
    image: caddy:2-alpine
    container_name: robot-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks: [appnet]

  # --------------------------- FastAPI 后端（兼出静态前端） ---------------------------
  backend:
    build: .
    container_name: robot-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - robot_data:/data           # 持久化 SQLite
    networks: [appnet]
    # 不对外暴露端口——只走 caddy 反代

volumes:
  robot_data:
  caddy_data:
  caddy_config:

networks:
  appnet:
    driver: bridge
